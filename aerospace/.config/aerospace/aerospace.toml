# AeroSpace configuration
# Docs: https://nikitabobko.github.io/AeroSpace/guide

config-version = 2

# Launch JankyBorders to outline the focused window
after-startup-command = [
    'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0x00000000 width=5.0',
]

start-at-login = true
auto-reload-config = true

# Normalizations (i3-like tree behavior)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Hovering a window focuses it
focus-follows-mouse.enabled = true

key-mapping.preset = 'qwerty'

# Workspaces: 1 = terminal, 2 = code, 3 = browser, 4-5 = spare
persistent-workspaces = ["1", "2", "3", "4", "5"]

gaps.inner.horizontal = 8
gaps.inner.vertical =   8
gaps.outer.left =       8
gaps.outer.bottom =     8
gaps.outer.top =        8
gaps.outer.right =      8

# ---------- App auto-assignment ----------

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser' # Arc
run = 'move-node-to-workspace 3'

# Apps that work better floating
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

# ---------- Keybindings ----------

[mode.main.binding]

    # Layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-f = 'fullscreen'
    alt-shift-f = 'layout floating tiling' # toggle float for current window

    # Focus (vim-style)
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # Move window
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # Switch workspace
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'

    # Move window to workspace (and follow it)
    alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
    alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
    alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
    alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
    alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'

    # Toggle between the two most recent workspaces
    alt-tab = 'workspace-back-and-forth'
    # Move whole workspace to next monitor (when docked)
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Service mode for rarely-used commands
    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']
