# AeroSpace configuration
# Docs: https://nikitabobko.github.io/AeroSpace/guide

config-version = 2

# Launch default apps
after-startup-command = [
    'exec-and-forget open -a Tasks',
]

start-at-login = true
auto-reload-config = true

# Normalizations (i3-like tree behavior)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

key-mapping.preset = 'qwerty'

# Workspaces: 1 = terminal, 2 = code, 3 = browser, 4 = tasks, 5 = spare, 8 = docker, 9 = chrome
persistent-workspaces = ["1", "2", "3", "4", "5", "8"]

gaps.inner.horizontal = 0
gaps.inner.vertical =   0
gaps.outer.left =       0
gaps.outer.bottom =     0
gaps.outer.top =        0
gaps.outer.right =      0

# ---------- App auto-assignment ----------

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace 1', 'fullscreen']

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = ['move-node-to-workspace 2', 'fullscreen']

[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser' # Arc
run = ['move-node-to-workspace 3', 'fullscreen']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['move-node-to-workspace 9', 'fullscreen']

[[on-window-detected]]
if.app-id = 'com.yogihq.tasks'
run = ['move-node-to-workspace 4', 'fullscreen']

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = ['move-node-to-workspace 5', 'fullscreen']

[[on-window-detected]]
if.app-id = 'com.docker.docker'
run = ['move-node-to-workspace 8', 'fullscreen']

# Apps that work better floating
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.iCal' # Calendar
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.reminders'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences' # System Settings
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.weather'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.clock'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.westbridge.stremio5-mac' # Stremio
run = 'layout floating'

# Catch-all: every other app opens fullscreen (must stay last — first matching rule wins)
[[on-window-detected]]
if = 'true'
run = 'fullscreen'

# ---------- Keybindings ----------

[mode.main.binding]

    # Layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-f = 'fullscreen'
    alt-shift-f = 'layout floating tiling' # toggle float for current window

    # Focus (vim-style)
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # Move window
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # Switch workspace
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-8 = 'workspace 8' # Docker
    alt-9 = 'workspace 9' # Chrome

    # Move window to workspace (and follow it)
    alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
    alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
    alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
    alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
    alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
    alt-shift-8 = 'move-node-to-workspace 8 --focus-follows-window'
    alt-shift-9 = 'move-node-to-workspace 9 --focus-follows-window'

    # Toggle between the two most recent workspaces
    alt-tab = 'workspace-back-and-forth'
    # Move whole workspace to next monitor (when docked)
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Service mode for rarely-used commands
    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']
